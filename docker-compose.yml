version: '3.8'

services:
  govsign:
    build:
      context: ./services/govsign
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    env_file:
      - .env
    restart: always

  mock-ca:
    build:
      context: ./services/mock-ca
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
    env_file:
      - .env
    restart: always

  qavach-sidecar:
    build:
      context: ./services/govsign
    command: uvicorn sidecar:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    environment:
      - PORT=8002
    env_file:
      - .env
    restart: always
